<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=3.0, user-scalable=yes">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://images.pexels.com">
    <link rel="dns-prefetch" href="https://images.pexels.com">
    
    <meta name="description" content="Browse amazing stars and galaxy photos. Discover stunning cosmic views.">
    <meta name="robots" content="index, follow">
    <meta property="og:title" content="Amazed Photos - Beautiful Stars & Galaxy Images | Mood Gallery">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">
    <title>Amazed Photos - Beautiful Stars & Galaxy Images | Free Stock Photos</title>
    <link rel="canonical" href="https://yourdomain.com/amazed.html">
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>✨</text></svg>">
</head>
<body data-mood="amazed">
    <main>
        <section id="gallery" class="gallery-section">
            <div class="loading-overlay" id="loadingOverlay"><div class="loader"></div><p>Loading amazed photos...</p></div>
            <div class="fullscreen-carousel" id="fullscreenCarousel">
                <div class="carousel-wrapper"><div class="carousel-inner" id="carouselInner"></div></div>
                <button class="carousel-nav carousel-nav-left" id="prevBtn">&lt;</button>
                <button class="carousel-nav carousel-nav-right" id="nextBtn">&gt;</button>
                <div class="carousel-header">
                    <div class="header-left">
                        <div class="mood-indicator"><span class="current-mood-icon">✨</span><span class="current-mood-name">Amazed</span></div>
                        <div class="music-control" id="musicControl">
                            <button class="music-btn" id="musicBtn">♪</button>
                            <input type="range" id="volumeSlider" min="0" max="100" value="50">
                        </div>
                    </div>
                    <div class="slide-counter"><span id="currentSlide">1</span> / <span id="totalSlides">8</span></div>
                    <div class="header-actions">
                        <button class="download-btn" id="downloadBtn" title="Download Image">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                        </button>
                        <button class="refresh-btn" id="refreshBtn">New Batch</button>
                        <a href="index.html" class="back-btn">Home</a>
                    </div>
                </div>
                <div class="thumbnail-dots" id="thumbnailDots"></div>
                <div class="thumbnail-bar" id="thumbnailBar"></div>
            </div>
            <audio id="bgAudio" preload="auto"><source src="" type="audio/mpeg"></audio>
        </section>
    </main>
    
    <section class="content-section">
        <div class="content-wrapper">
            <h2>Beautiful Amazed Photos for Wonder</h2>
            <p>Discover beautiful amazed mood aesthetic images that fill you with wonder and awe. These stunning galaxy and star photos remind you of the vastness of the universe.</p>
        </div>
    </section>
    
    <footer class="footer"><p>Photos provided by <a href="https://www.pexels.com" target="_blank" rel="noopener">Pexels</a></p></footer>
    <script>
        window.moodConfig = { query: 'stars galaxy', per_page: 2, hasMusic: true };
        window.localMusicPlaylist = [
            '惊叹曲库/Green Ribbon Sky (1).mp3',
            '惊叹曲库/Green Ribbon Sky.mp3'
        ];
    </script>
    <script src="gallery.js"></script>
</body>
</html>
